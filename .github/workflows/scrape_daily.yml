name: Daily Scraper & DB Upload

on:
  schedule:
    # Runs at 03:00 UTC (12:00 AM Buenos Aires time GMT-3) every day
    - cron: '0 10 * * *'
  
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        supermarket: [carrefour, dia, coto]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Matches a modern Python version

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Make sure psycopg binary is explicitly available
          pip install "psycopg[binary]"

      - name: Run Scraper Script (main.py)
        env:
          # This pulls the environment variable safely stored in your repository settings
          COMPARAR_DATABASE_URL: ${{ secrets.COMPARAR_DATABASE_URL }}
        run: |
          python main.py ${{ matrix.supermarket }}
